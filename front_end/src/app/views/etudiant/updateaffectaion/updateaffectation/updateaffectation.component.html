<div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header">
            <h3>Mettre à jour l'affectation</h3>
          </div>
          <div class="card-body">
            <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
              <div class="form-group">
                <label for="nomsociete">Nom de la société</label>
                <input type="text" class="form-control" id="nomsociete" formControlName="nomsociete">
              </div>
              <div class="form-group">
                <label for="sujet">Sujet</label>
                <input type="text" class="form-control" id="sujet" formControlName="sujet">
              </div>
              <div class="form-group">
                <label for="adresse">Adresse</label>
                <input type="text" class="form-control" id="adresse" formControlName="adresse">
              </div>
              <div class="form-group">
                <label for="numrsociete">Numéro de société</label>
                <input type="text" class="form-control" id="numrsociete" formControlName="numrsociete">
              </div>
              <div class="form-group">
                <label for="nomencadreurtechnique">Nom de l'encadreur technique</label>
                <input type="text" class="form-control" id="nomencadreurtechnique" formControlName="nomencadreurtechnique">
              </div>
              <div class="form-group">
                <label for="emailetud">Email étudiant</label>
                <input type="email" class="form-control" id="emailetud" formControlName="emailetud">
              </div>
              <div class="d-flex justify-content-between">
                <button type="submit" class="btn btn-primary" [disabled]="updateForm.invalid">Mettre à jour</button>
                <button type="button" class="btn btn-secondary" routerLink="/etudiant/affectations">Annuler</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
