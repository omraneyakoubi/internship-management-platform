<div class="col-lg-12 grid-margin stretch-card">
  <div class="card">
    <div class="card-body">
      <br>
      <div class="table-responsive text-nowrap">
        <table class="table table-borderless">
          <thead>
            <tr>
              <th>Nom Etudiant</th>
              <th>Email Etudiant</th>
              <th>Nom encadreur</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let etudencadreur of etudencadreurList">
              <td>
                <i class="fab fa-angular fa-lg text-danger me-3"></i>
                <strong>{{ etudencadreur.nomet }}</strong>
              </td>
              <td>
                <i class="fab fa-angular fa-lg text-danger me-3"></i>
                {{ etudencadreur.emailetud }}
              </td>
              <td>{{ etudencadreur.encadreur }}</td>
              <td>
                <button (click)="openAddModal(etudencadreur.emailetud)" class="btn btn-sm btn-info">
                  <i class="fas fa-plus"></i> Add
                </button>
                <button (click)="viewPlanningByEmail(etudencadreur.emailetud)" class="btn btn-sm btn-primary">
                  <i class="far fa-eye"></i> View Planning
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- SweetAlert2 Form Template -->
<ng-template #addFormTemplate>
  <div id="addForm">
    <input type="text" id="email" class="swal2-input" placeholder="Email">
    <input type="datetime-local" id="date" class="swal2-input" placeholder="Date">
    <input type="text" id="fedback" class="swal2-input" placeholder="Fedback">
  </div>
</ng-template>
