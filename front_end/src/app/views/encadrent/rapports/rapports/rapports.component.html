<div class="col-lg-12 grid-margin stretch-card">
   <br>
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Nom Prenom</th>
                <th>Rapport</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let rapport of rapports">
                <td class="py-1">{{ rapport.nomprenom }}</td>
                <td>{{ rapport.rapport }}</td>
                <td>
                  <button class="btn btn-primary btn-sm" (click)="downloadRapport(rapport.id, rapport.rapport)">Télécharger</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
