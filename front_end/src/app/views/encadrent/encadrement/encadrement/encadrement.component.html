
<div class="col-lg-12 grid-margin stretch-card">
    <div class="card">
      <div class="card-body">
     
        <br>
      <div class="table-responsive text-nowrap">
        <table class="table table-borderless">
          <thead>
            <tr>
              <th>Nom Etudiant</th>
              <th>Email Etudiant</th>

              <th>Nom encadreur</th>
              <th>Users</th>
              <th>Sujet</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let etudencadreur of etudencadreurList">
              <td>
                <i class="fab fa-angular fa-lg text-danger me-3"></i>
                <strong>{{ etudencadreur.nomet }}</strong>
              </td>
              <td>
                <i class="fab fa-angular fa-lg text-danger me-3"></i>
                {{ etudencadreur.emailetud }}
              </td>
              <td>{{ etudencadreur.encadreur }}</td>
              <td>
                <ul class="list-unstyled users-list m-0 avatar-group d-flex align-items-center">
                  <li
                    data-bs-toggle="tooltip"
                    data-popup="tooltip-custom"
                    data-bs-placement="top"
                    class="avatar avatar-xs pull-up"
                    title="Lilian Fuller"
                  >
                    <img src="/assets/assets/img/avatars/5.png" alt="Avatar" class="rounded-circle" />
                  </li>
                  <li
                    data-bs-toggle="tooltip"
                    data-popup="tooltip-custom"
                    data-bs-placement="top"
                    class="avatar avatar-xs pull-up"
                    title="Sophia Wilkerson"
                  >
                    <img src="/assets/assets/img/avatars/6.png" alt="Avatar" class="rounded-circle" />
                  </li>
               
                </ul>
              </td>
              <td>{{ etudencadreur.sujet }}</td>
  
             
            </tr>
         
          </tbody>
        </table>
      </div>
    </div>
