<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoFinance - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5; /* Light background color */
        }

        .login-container {
            background-color: #ffffff; /* White container background */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 500px;
        }

        .login-container h1 {
            text-align: center;
            color: #1e4072; /* University's primary color */
        }

        .login-form {
            margin-top: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #cccccc;
            box-sizing: border-box;
        }

        .login-form button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #1e4072; /* University's primary color */
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-form button:hover {
            background-color: #173157; /* Darker shade of primary color on hover */
        }

        .login-form p {
            margin-top: 15px;
            text-align: center;
            color: #777777;
        }

        .app-brand-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1e4072; /* University's primary color */
        }

        .app-brand-logo img {
            width: 80px; /* Adjust the logo size as needed */
            height: auto;
            margin-right: 10px;
        }

        .app-brand-text {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="app-brand-link">
            <span class="app-brand-logo">
              <!-- Replace the src attribute with your custom logo path -->
              <img src="assets/images-removebg-preview.png" width="200" alt="Université de Jendouba Logo" />
            </span>
            <span class="app-brand-text">Université de Jendouba</span>
          </a>
        <form class="login-form" (submit)="onSubmit()">
            <input type="email" name="email" placeholder="Email Address" [(ngModel)]="email" required>
            <input type="password" name="password" placeholder="Password" [(ngModel)]="mdp" required>
            <div class="error-message" *ngIf="error">{{ error }}</div>

            <button type="submit">Login</button>
        </form>
        <p>Don't have an account yet? <a routerLink="/signup">Sign up</a></p>
    </div>
</body>
</html>
